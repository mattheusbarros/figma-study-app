<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Study Roadmap</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#020617,#000);
  color:#e5e7eb;
}
.container{max-width:1200px;margin:auto;padding:20px}
h1{text-align:center;font-size:34px;margin-bottom:10px}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

button{
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
}

.progress-bar{height:14px;background:#111;border-radius:20px;margin:20px 0}
.progress{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);width:0%;border-radius:20px;transition:0.5s}

.item{display:flex;justify-content:space-between;margin:8px 0}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}

iframe{border-radius:15px;width:100%}

</style>
</head>
<body>

<div class="container">
<h1>🚀 Ultimate Study Roadmap</h1>

<div class="progress-bar"><div id="progress" class="progress"></div></div>
<p id="stats" style="text-align:center"></p>

<div id="content"></div>

<div class="grid">
<div class="card">
<h2>🧠 Quiz Inteligente</h2>
<p id="quiz">Clique para gerar</p>
<button onclick="quiz()">Gerar</button>
</div>

<div class="card">
<h2>🔥 Nível & XP</h2>
<p id="level"></p>
</div>
</div>

<div class="card">
<h2>📅 Cronograma automático</h2>
<ul id="schedule"></ul>
</div>

<div class="card">
<h2>🎧 Player YouTube</h2>
<input id="yt" placeholder="Cole link do YouTube">
<button onclick="loadYT()">Carregar</button>
<iframe id="player" height="250" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
</div>

</div>

<audio id="click" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const topics=[
{title:"Fundamentos",items:["UX","UI","Heurísticas","Design Thinking"]},
{title:"Figma",items:["Frames","Auto Layout","Components","Prototyping"]},
{title:"Design Avançado",items:["Design System","Acessibilidade","Microinterações"]},
{title:"Mercado",items:["Portfólio","Freelance","Entrevistas"]}
];

let state=JSON.parse(localStorage.getItem("study"))||{};

function save(){localStorage.setItem("study",JSON.stringify(state));}
function sound(){document.getElementById("click").play();}

function render(){
let total=0,done=0;
const el=document.getElementById("content");
el.innerHTML="";

topics.forEach((t,i)=>{
let card=document.createElement("div");
card.className="card";
let html=`<h2>${t.title}</h2>`;

t.items.forEach((it,j)=>{
let key=i+"-"+j;
total++;
if(state[key]) done++;

html+=`<div class='item'>
<span>${it}</span>
<button onclick="toggle('${key}')">${state[key]?"✔":"Estudar"}</button>
</div>`;
});

card.innerHTML=html;
el.appendChild(card);
});

let percent=(done/total)*100;
document.getElementById("progress").style.width=percent+"%";
document.getElementById("stats").innerText=`${done}/${total} (${Math.round(percent)}%)`;

let xp=done*10;
let lvl=Math.floor(xp/50);
document.getElementById("level").innerText=`XP: ${xp} | Nível: ${lvl}`;
}

function toggle(k){state[k]=!state[k];sound();save();render();}

function quiz(){
let pool=[];
topics.forEach((t,i)=>{
t.items.forEach((it,j)=>{
let key=i+"-"+j;
if(!state[key]) pool.push(it);
});
});

let item=pool.length?pool[Math.floor(Math.random()*pool.length)]:"UX";
let q=[
`Explique ${item}`,
`Como aplicar ${item}?`,
`Por que ${item} importa?`
];

document.getElementById("quiz").innerText=q[Math.floor(Math.random()*q.length)];
}

function schedule(){
let el=document.getElementById("schedule");
el.innerHTML="";
topics.forEach((t,i)=>{
let li=document.createElement("li");
li.innerText=`Dia ${i+1}: ${t.title}`;
el.appendChild(li);
});
}

function loadYT(){
let url=document.getElementById("yt").value;
let id=url.split("v=")[1]?.split("&")[0];
if(id){document.getElementById("player").src=`https://www.youtube.com/embed/${id}`}
}

render();
schedule();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>

</body>
</html>
