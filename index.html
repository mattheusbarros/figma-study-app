<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study AI Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#020617,#000);
  color:#e5e7eb;
  overflow-x:hidden;
}
.container{max-width:1100px;margin:auto;padding:20px}

h1{text-align:center;font-size:32px}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  transition:0.3s;
}
.card:hover{transform:translateY(-5px) scale(1.01)}

button{
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05)}

.progress-bar{height:14px;background:#111;border-radius:20px;margin:20px 0}
.progress{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  width:0%;
  border-radius:20px;
  transition:0.5s;
}

.item{display:flex;justify-content:space-between;margin:8px 0}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}

iframe{border-radius:15px;width:100%}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.badge{
  background:#22c55e;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
}

</style>
</head>

<body>
<div class="container">

<h1>🚀 Study AI Pro</h1>

<div class="progress-bar"><div id="progress" class="progress"></div></div>
<p id="stats" style="text-align:center"></p>

<div id="content"></div>

<div class="grid">

<div class="card">
<h2>🧠 Quiz Inteligente</h2>
<p id="quiz">Clique para gerar</p>
<button onclick="generateQuiz()">Gerar Pergunta</button>
</div>

<div class="card">
<h2>📊 Stats</h2>
<p id="level"></p>
</div>

</div>

<div class="card">
<h2>🎯 Meta diária</h2>
<input id="goal" placeholder="Ex: estudar 5 tópicos">
<button onclick="saveGoal()">Salvar Meta</button>
<p id="goalDisplay"></p>
</div>

<div class="card">
<h2>🎧 Player YouTube</h2>
<input id="ytInput" placeholder="Cole link do YouTube">
<button onclick="loadVideo()">Carregar Vídeo</button>
<iframe id="player" height="250" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
</div>

</div>

<audio id="click" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const topics=[
{title:"Introdução",items:["Canvas","Frames","Layers"]},
{title:"Ferramentas",items:["Shapes","Texto","Alinhamento"]},
{title:"Componentes",items:["Auto Layout","Variants","Styles"]},
{title:"Prototipagem",items:["Interações","Transições"]}
];

let state=JSON.parse(localStorage.getItem("study"))||{};
let goal=localStorage.getItem("goal")||"";

function save(){localStorage.setItem("study",JSON.stringify(state));}
function sound(){document.getElementById("click").play();}

function render(){
let total=0,done=0;
const el=document.getElementById("content");
el.innerHTML="";

topics.forEach((t,i)=>{
let card=document.createElement("div");
card.className="card";
let html=`<h2>${t.title}</h2>`;

t.items.forEach((it,j)=>{
let key=i+"-"+j;
total++;
if(state[key]) done++;

html+=`<div class='item'>
<span>${it}</span>
<button onclick="toggle('${key}')">${state[key]?"✔":"Marcar"}</button>
</div>`;
});

card.innerHTML=html;
el.appendChild(card);
});

let percent=(done/total)*100;
document.getElementById("progress").style.width=percent+"%";
document.getElementById("stats").innerText=`${done}/${total} concluídos (${Math.round(percent)}%)`;

let lvl=Math.floor(done/2);
document.getElementById("level").innerText=`Nível: ${lvl}`;
}

function toggle(k){state[k]=!state[k];sound();save();render();}

function generateQuiz(){
let pool=[];
topics.forEach((t,i)=>{
t.items.forEach((it,j)=>{
let key=i+"-"+j;
if(!state[key]) pool.push(it);
});
});

let item=pool.length?pool[Math.floor(Math.random()*pool.length)]:"Figma";
let q=[
`Explique ${item}`,
`Como usar ${item}?`,
`Por que ${item} é importante?`
];

document.getElementById("quiz").innerText=q[Math.floor(Math.random()*q.length)];
}

function saveGoal(){
goal=document.getElementById("goal").value;
localStorage.setItem("goal",goal);
document.getElementById("goalDisplay").innerText="Meta: "+goal;
}

function loadVideo(){
let url=document.getElementById("ytInput").value;
let id=url.split("v=")[1]?.split("&")[0];
if(id){
document.getElementById("player").src=`https://www.youtube.com/embed/${id}`;
}
}

render();
document.getElementById("goalDisplay").innerText="Meta: "+goal;

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>

</body>
</html>
